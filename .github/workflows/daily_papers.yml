name: Daily arXiv Paper Alerts

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-paper-alerter]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: litfeed-runs
  cancel-in-progress: false

jobs:
  fetch-and-alert:
    runs-on: ubuntu-latest
    # 15 (not 10): a cache-miss run must download the embedding model from HF,
    # whose anonymous rate limits can add minutes of backoff. Cached runs are fast.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache embedding model
        id: hf-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2-v1

      - name: Pre-download embedding model (cache miss only)
        if: steps.hf-cache.outputs.cache-hit != 'true'
        env:
          # Authenticated download → higher HF rate limit (avoids anonymous 429).
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"

      - name: Run paper alerter
        env:
          # Model is cached above; never hit the HF hub during the run (avoids 429).
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          LITFEED_TO_READ_CHAT_ID: ${{ secrets.LITFEED_TO_READ_CHAT_ID }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROK_MODEL: ${{ vars.GROK_MODEL }}
          # Cloudflare D1 holds all runtime state (votes, reading_log,
          # sent_ids, last_batch, last_update_id). config.json carries only
          # categories; /reset and confirmed /clear update it via the Worker
          # (GitHub Contents API), not this workflow.
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          CF_D1_API_TOKEN: ${{ secrets.CF_D1_API_TOKEN }}
        run: python main.py

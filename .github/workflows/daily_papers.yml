name: Daily arXiv Paper Alerts

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-paper-alerter]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: telegram-poll
  cancel-in-progress: false

jobs:
  fetch-and-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run paper alerter
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          LITFEED_TO_READ_CHAT_ID: ${{ secrets.LITFEED_TO_READ_CHAT_ID }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROK_MODEL: ${{ vars.GROK_MODEL }}
          # Webhook is the update consumer; getUpdates would 409 here.
          LITFEED_DISABLE_POLL: "1"
          # Cloudflare D1 holds all runtime state (votes, reading_log,
          # sent_ids, last_batch, last_update_id). config.json carries only
          # categories and is rewritten only on /reset (process_update.yml).
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          CF_D1_API_TOKEN: ${{ secrets.CF_D1_API_TOKEN }}
        run: python main.py

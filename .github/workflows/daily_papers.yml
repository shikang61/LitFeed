name: Daily arXiv Paper Alerts

on:
  schedule:
    # Fallback only — GitHub cron unreliable. Primary trigger = repository_dispatch from cron-job.org.
    # 10:00 Europe/London year-round (split for DST since GH cron has no TZ support).
    - cron: "0 9 * 4-10 *"   # BST window (Apr–Oct)
    - cron: "0 10 * 1-3,11,12 *"  # GMT window (Nov–Mar)
  workflow_dispatch:
  repository_dispatch:
    types: [run-paper-alerter]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write  # required to commit config.json changes back to repo

concurrency:
  group: telegram-poll
  cancel-in-progress: false

jobs:
  fetch-and-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run paper alerter
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py

      - name: Commit state changes
        run: |
          if ! git diff --quiet config.json votes.json 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add config.json votes.json 2>/dev/null || true
            git commit -m "chore: update state from daily run" || exit 0
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push
          else
            echo "No state changes."
          fi

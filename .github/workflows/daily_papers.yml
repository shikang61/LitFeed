name: Daily arXiv Paper Alerts

on:
  schedule:
    # Fallback only — GitHub cron unreliable. Primary trigger = repository_dispatch from cron-job.org.
    # 10:00 Europe/London year-round (split for DST since GH cron has no TZ support).
    - cron: "0 9 * 4-10 *"   # BST window (Apr–Oct)
    - cron: "0 10 * 1-3,11,12 *"  # GMT window (Nov–Mar)
  workflow_dispatch:
  repository_dispatch:
    types: [run-paper-alerter]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  fetch-and-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run paper alerter
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py

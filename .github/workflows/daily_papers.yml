name: Daily arXiv Paper Alerts

on:
  schedule:
    # 10:00, 14:00, 16:00 London time (BST = UTC+1). Shift +1h in GMT winter.
    - cron: "0 9 * * *"
    - cron: "0 13 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write  # required to commit config.json changes back to repo

concurrency:
  group: telegram-poll
  cancel-in-progress: false

jobs:
  fetch-and-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run paper alerter
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py

      - name: Commit config changes
        run: |
          if ! git diff --quiet config.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add config.json
            git commit -m "chore: update config.json from Telegram commands"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push
          else
            echo "No config changes."
          fi

name: Poll Telegram Commands (deprecated)

# Deprecated: getUpdates polling was removed from main.py. The Cloudflare Worker
# webhook (process_update.yml) is the only Telegram consumer. This workflow exits
# immediately when run manually.

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "*/5 * * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  # Only one polling run at a time. Prevents pushing stale config over a newer one.
  group: telegram-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Process Telegram commands
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          LITFEED_TO_READ_CHAT_ID: ${{ secrets.LITFEED_TO_READ_CHAT_ID }}
        run: python main.py --commands-only

      - name: Commit state changes
        run: |
          if [[ -n "$(git status --porcelain -- config.json votes.json reading_log.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add config.json votes.json reading_log.json 2>/dev/null || true
            git commit -m "chore: update state from Telegram poll" || exit 0
            # Rebase in case daily_papers workflow pushed concurrently.
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push
          else
            echo "No state changes."
          fi

name: Poll Telegram Commands

on:
  schedule:
    # Every 5 minutes (GitHub cron may drift to 10-15 min under load).
    - cron: "*/5 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  # Only one polling run at a time. Prevents pushing stale config over a newer one.
  group: telegram-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Process Telegram commands
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py --commands-only

      - name: Commit state changes
        run: |
          if ! git diff --quiet config.json votes.json 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add config.json votes.json 2>/dev/null || true
            git commit -m "chore: update state from Telegram poll" || exit 0
            # Rebase in case daily_papers workflow pushed concurrently.
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push
          else
            echo "No state changes."
          fi

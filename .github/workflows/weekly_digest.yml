name: Weekly Reading Digest

on:
  schedule:
    # Sunday evening Cambridge time during standard time; cron is UTC.
    - cron: "0 18 * * 0"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: telegram-poll
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send weekly reading digest
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROK_MODEL: ${{ vars.GROK_MODEL }}
        run: python main.py --weekly-digest

      - name: Commit state changes
        run: |
          if [[ -n "$(git status --porcelain -- config.json votes.json reading_log.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add config.json votes.json reading_log.json 2>/dev/null || true
            git commit -m "chore: update state from weekly digest" || exit 0
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push
          else
            echo "No state changes."
          fi

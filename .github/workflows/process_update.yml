name: Process Telegram Update

# Triggered by the Cloudflare Worker via repository_dispatch when a Telegram
# update needs server-side state mutation (commands, votes, reading-log writes).
# The Worker handles instant Telegram-side actions itself.

on:
  repository_dispatch:
    types: [telegram-update]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  # Same group as daily / digest runs so state-file writes don't race.
  group: telegram-poll
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply webhook update
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          LITFEED_TO_READ_CHAT_ID: ${{ secrets.LITFEED_TO_READ_CHAT_ID }}
          LITFEED_UPDATE_JSON: ${{ toJSON(github.event.client_payload.update) }}
          LITFEED_WEBHOOK_HANDLED: ${{ github.event.client_payload.webhook_handled }}
          LITFEED_DISABLE_POLL: "1"
          # Cloudflare D1 (runtime state).
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          CF_D1_API_TOKEN: ${{ secrets.CF_D1_API_TOKEN }}
        run: python main.py --apply-update

      - name: Commit state changes
        # The only file this run can mutate is config.json, and only on
        # /reset (which rewrites categories). safe_state_push.sh exits
        # cleanly when there's nothing to commit, so it's a no-op for
        # every other command.
        run: >-
          scripts/safe_state_push.sh
          "chore: update categories from Telegram command"
